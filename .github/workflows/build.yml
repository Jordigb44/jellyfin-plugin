name: Build & Deploy Plugin

on:
  push:
    branches: [main]
    paths-ignore:
      - 'repo/**'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build src/Jellyfin.Plugin.M3UExport -c Release

      - name: Get version from build.yaml
        id: version
        run: |
          VER=$(grep '^version:' build.yaml | sed 's/version: *"//;s/"//')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create plugin zip
        run: |
          VER=${{ steps.version.outputs.version }}
          mkdir -p repo
          cd src/Jellyfin.Plugin.M3UExport/bin/Release/net8.0
          zip -j ../../../../../repo/Jellyfin.Plugin.M3UExport_${VER}.zip \
            Jellyfin.Plugin.M3UExport.dll

      - name: Update manifest
        run: |
          VER=${{ steps.version.outputs.version }}
          REPO=${{ github.repository }}
          CHKSUM=$(md5sum repo/Jellyfin.Plugin.M3UExport_${VER}.zip | cut -d' ' -f1)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          URL="https://raw.githubusercontent.com/${REPO}/main/repo/Jellyfin.Plugin.M3UExport_${VER}.zip"

          if [ ! -f repo/manifest.json ]; then
            printf '[\n  {\n    "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",\n    "name": "M3U Export",\n    "description": "Exporta peliculas, series, TV en vivo y colecciones a listas M3U.",\n    "overview": "Exporta tu biblioteca Jellyfin a listas M3U con control de usuarios.",\n    "owner": "'${{ github.repository_owner }}'",\n    "category": "General",\n    "versions": []\n  }\n]\n' > repo/manifest.json
          fi

          jq --arg ver "$VER" --arg chk "$CHKSUM" --arg ts "$TS" --arg url "$URL" \
            'if any(.[0].versions[]; .version == $ver) then
               (.[0].versions[] | select(.version == $ver)) |= {
                 "version": $ver,
                 "changelog": "Compilacion automatica desde CI.",
                 "targetAbi": "10.10.0.0",
                 "sourceUrl": $url,
                 "checksum": $chk,
                 "timestamp": $ts
               }
             else
               .[0].versions = [{
                 "version": $ver,
                 "changelog": "Compilacion automatica desde CI.",
                 "targetAbi": "10.10.0.0",
                 "sourceUrl": $url,
                 "checksum": $chk,
                 "timestamp": $ts
               }] + .[0].versions
             end' repo/manifest.json > repo/manifest.json.tmp \
          && mv repo/manifest.json.tmp repo/manifest.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add repo/manifest.json repo/*.zip
          git diff --staged --quiet || git commit -m "Auto-build: v${{ steps.version.outputs.version }}"
          git push
