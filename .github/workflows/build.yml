name: Build & Deploy Plugin

on:
  push:
    branches: [main]
    paths-ignore:
      - 'repo/**'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build
        run: dotnet build src/Jellyfin.Plugin.M3UExport -c Release

      - name: Get version from build.yaml
        id: version
        run: |
          VER=$(grep '^version:' build.yaml | sed 's/version: *"//;s/"//')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Create plugin zip
        run: |
          VER=${{ steps.version.outputs.version }}
          mkdir -p repo
          cd src/Jellyfin.Plugin.M3UExport/bin/Release/net8.0
          zip -j ../../../../../repo/Jellyfin.Plugin.M3UExport_${VER}.zip \
            Jellyfin.Plugin.M3UExport.dll

      - name: Update manifest
        shell: bash
        env:
          VER: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          export CHKSUM=$(md5sum repo/Jellyfin.Plugin.M3UExport_${VER}.zip | cut -d' ' -f1)
          export TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          python3 -c "
import json, os
ver = os.environ['VER']
chk = os.environ['CHKSUM']
ts = os.environ['TS']
repo = os.environ['REPO']
url = f'https://raw.githubusercontent.com/{repo}/main/repo/Jellyfin.Plugin.M3UExport_{ver}.zip'

entry = {
    'version': ver,
    'changelog': 'CompilaciĂłn automĂˇtica desde CI.',
    'targetAbi': '10.10.0.0',
    'sourceUrl': url,
    'checksum': chk,
    'timestamp': ts
}

try:
    with open('repo/manifest.json') as f:
        manifest = json.load(f)
except (FileNotFoundError, json.JSONDecodeError):
    manifest = [{
        'guid': 'a1b2c3d4-e5f6-7890-abcd-ef1234567890',
        'name': 'M3U Export',
        'description': 'Exporta pelĂ­culas, series, TV en vivo y colecciones a listas M3U compatibles con cualquier reproductor IPTV. Soporta filtrado por usuario, API Key embebida, streaming directo/transcodificado/ruta local, y exportaciĂłn programada a archivo.',
        'overview': 'Exporta tu biblioteca Jellyfin a listas M3U con control de usuarios.',
        'owner': '${{ github.repository_owner }}',
        'category': 'General',
        'versions': []
    }]

# Avoid duplicate entries
existing = [v['version'] for v in manifest[0]['versions']]
if ver not in existing:
    manifest[0]['versions'].insert(0, entry)
else:
    # Update existing entry
    for v in manifest[0]['versions']:
        if v['version'] == ver:
            v.update(entry)
            break

with open('repo/manifest.json', 'w') as f:
    json.dump(manifest, f, indent=2)
    f.write('\n')
"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add repo/manifest.json repo/*.zip
          git diff --staged --quiet || git commit -m "Auto-build: v${{ steps.version.outputs.version }}"
          git push
