<!DOCTYPE html>
<html>
<head>
  <title>M3U Export Config</title>
</head>
<body style="background:#1c1c1c;color:#e0e0e0;font-family:sans-serif;padding:24px;">
  <h1 style="color:#00a4dc;">M3U Export Plugin</h1>
  <p>Si ves esto, el HTML se sirve correctamente.</p>

  <div style="background:#2a2a2a;border:1px solid #444;border-radius:8px;padding:16px;margin:16px 0;">
    <h2 style="color:#ccc;">Configuraci&oacute;n</h2>
    <div id="config-status">Cargando configuraci&oacute;n...</div>
  </div>

  <button onclick="saveConfig()" style="padding:10px 24px;background:#00a4dc;color:#fff;border:none;border-radius:6px;cursor:pointer;">Guardar</button>
  <button onclick="triggerExport()" style="padding:10px 24px;background:#e74c3c;color:#fff;border:none;border-radius:6px;cursor:pointer;">Exportar</button>

  <div id="status" style="margin-top:12px;display:none;"></div>

  <script>
    var pluginId = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';

    function showStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.style.display = 'block';
      el.style.background = type === 'error' ? '#3a1a1a' : '#1a3a2a';
      el.style.border = '1px solid ' + (type === 'error' ? '#e74c3c' : '#2ecc71');
      el.style.color = type === 'error' ? '#e74c3c' : '#2ecc71';
      el.style.padding = '10px 16px';
      el.style.borderRadius = '6px';
    }

    function apiUrl(path) {
      if (window.ApiClient && ApiClient.serverAddress && ApiClient.serverAddress()) {
        return ApiClient.serverAddress() + path;
      }
      var loc = window.location;
      return loc.protocol + '//' + loc.hostname + (loc.port ? ':' + loc.port : '') + path;
    }

    async function loadConfig() {
      var statusEl = document.getElementById('config-status');
      try {
        var url = apiUrl('/plugins/' + pluginId + '/Configuration');
        var data;
        statusEl.textContent = 'Obteniendo ' + url;
        
        if (window.ApiClient) {
          statusEl.textContent = 'Usando ApiClient...';
          if (ApiClient.getPluginConfiguration) {
            data = await ApiClient.getPluginConfiguration(pluginId);
          } else if (ApiClient.getJSON) {
            data = await ApiClient.getJSON(url);
          } else {
            // Try fetching
            var r = await fetch(url);
            data = await r.json();
          }
        } else {
          statusEl.textContent = 'ApiClient no disponible, usando fetch...';
          var r = await fetch(url);
          data = await r.json();
        }
        
        statusEl.textContent = 'Configuraci&oacute;n cargada: ' + JSON.stringify(data).substring(0, 200);
      } catch (e) {
        statusEl.textContent = 'Error: ' + (e.message || e);
        showStatus('Error al cargar: ' + (e.message || e), 'error');
      }
    }

    async function saveConfig() {
      try {
        var url = apiUrl('/plugins/' + pluginId + '/Configuration');
        if (window.ApiClient && ApiClient.ajax) {
          await ApiClient.ajax({
            type: 'POST',
            url: url,
            data: '{}',
            contentType: 'application/json'
          });
        } else {
          await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}'
          });
        }
        showStatus('Guardado (config vac&iacute;a)', 'success');
      } catch (e) {
        showStatus('Error: ' + (e.message || e), 'error');
      }
    }

    async function triggerExport() {
      try {
        var url = apiUrl('/M3UExport/export');
        var resp;
        if (window.ApiClient && ApiClient.ajax) {
          resp = await ApiClient.ajax({ type: 'GET', url: url });
        } else {
          var r = await fetch(url);
          resp = await r.text();
        }
        var data = typeof resp === 'string' ? JSON.parse(resp) : resp;
        showStatus('Exportaci&oacute;n: ' + (data.message || 'OK'), 'success');
      } catch (e) {
        showStatus('Error export: ' + (e.message || e), 'error');
      }
    }

    loadConfig();
  </script>
</body>
</html>
